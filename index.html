<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>סריקת ברקוד קרטון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<!--
  Standalone page - host this OUTSIDE Apps Script (e.g. GitHub Pages).
  Apps Script's HtmlService iframe (script.googleusercontent.com) blocks
  getUserMedia, so camera access has to happen in a real top-level popup
  window like this one. It sends the scanned code back to the window that
  opened it via postMessage and then closes itself - but ONLY once a scan
  matches the expected carton pattern ("91" + "05"/"25" + rest); anything
  else is silently ignored and scanning continues, so a stray barcode in
  frame doesn't accidentally get accepted.

  Opened as: scanner.html?lang=en|he|ar (defaults to he if omitted).
-->
<script src="https://unpkg.com/@zxing/library@0.23.0/umd/index.min.js"></script>
<style>
  :root { --primary:#0f6e5c; --bg:#111; }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0; height:100%;
    background: var(--bg); color:#fff;
    font-family: 'Noto Sans Thai', 'Segoe UI', Arial, sans-serif;
    display:flex; flex-direction:column;
  }
  header { padding: 14px; text-align:center; font-size:16px; font-weight:600; background:#000; }
  .video-wrap { position: relative; flex:1; overflow:hidden; background:#000; }
  video { width:100%; height:100%; object-fit:cover; }
  .frame {
    position:absolute; top:50%; left:50%;
    width:80%; max-width:320px; height:110px;
    transform:translate(-50%,-50%);
    border:3px solid var(--primary);
    border-radius:10px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,.45);
  }
  #status { padding:12px; text-align:center; font-size:14px; min-height:36px; }
  #status.err { color:#ff8a80; }
  #status.ok { color:#7CFFB2; }
  .actions { display:flex; gap:10px; padding:12px 16px 18px; }
  button { flex:1; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
  #closeBtn { background:#333; color:#fff; }
  #manualBtn { background:var(--primary); color:#fff; }
  .manual-box { display:none; padding: 0 16px 16px; }
  .manual-box.show { display:block; }
  .manual-box input { width:100%; padding:12px; font-size:16px; border-radius:8px; border:none; margin-bottom:6px; }
  .manual-box button { width:100%; background:var(--primary); color:#fff; }
  .manual-error { color:#ff8a80; font-size:13px; min-height:16px; margin-bottom:6px; }
</style>
</head>
<body>
  <header id="headerTitle">סרוק ברקוד קרטון</header>

  <div class="video-wrap">
    <video id="video" autoplay muted playsinline></video>
    <div class="frame"></div>
  </div>

  <div id="status">מבקש הרשאת מצלמה...</div>

  <div class="manual-box" id="manualBox">
    <input type="text" id="manualInput" placeholder="הקלד/י מספר קרטון (כולל 91 בהתחלה)">
    <div class="manual-error" id="manualError"></div>
    <button id="manualSubmit">אישור</button>
  </div>

  <div class="actions">
    <button id="manualBtn">הזנה ידנית</button>
    <button id="closeBtn">בטל</button>
  </div>

<script>
  // ====== i18n (mirrors the language chosen on the main page) ======
  var TR = {
    en: {
      title: 'Scan Carton Barcode',
      requesting: 'Requesting camera permission...',
      aim: 'Aim the barcode at the frame',
      invalidFormat: 'Not recognized as a valid carton barcode. Keep scanning, or enter it manually.',
      cameraErrorPrefix: 'Camera error: ',
      manualBtn: 'Manual entry',
      manualPlaceholder: 'Type carton number (incl. leading 91)',
      manualSubmit: 'OK',
      closeBtn: 'Cancel',
      scannedPrefix: 'Scanned: '
    },
    he: {
      title: 'סרוק ברקוד קרטון',
      requesting: 'מבקש הרשאת מצלמה...',
      aim: 'כוונ/י את הברקוד למסגרת',
      invalidFormat: 'הברקוד לא זוהה כקרטון תקין. המשיכ/י לסרוק, או הזינ/י ידנית.',
      cameraErrorPrefix: 'שגיאת מצלמה: ',
      manualBtn: 'הזנה ידנית',
      manualPlaceholder: 'הקלד/י מספר קרטון (כולל 91 בהתחלה)',
      manualSubmit: 'אישור',
      closeBtn: 'בטל',
      scannedPrefix: 'נסרק: '
    },
    ar: {
      title: 'امسح باركود الكرتون',
      requesting: 'جارٍ طلب إذن الكاميرا...',
      aim: 'وجّه الباركود نحو الإطار',
      invalidFormat: 'لم يتم التعرف عليه ككرتون صالح. تابع المسح، أو أدخله يدويًا.',
      cameraErrorPrefix: 'خطأ في الكاميرا: ',
      manualBtn: 'إدخال يدوي',
      manualPlaceholder: 'اكتب رقم الكرتون (متضمنًا 91 في البداية)',
      manualSubmit: 'موافق',
      closeBtn: 'إلغاء',
      scannedPrefix: 'تم المسح: '
    },
    th: {
      title: 'สแกนบาร์โค้ดกล่อง',
      requesting: 'กำลังขอสิทธิ์ใช้กล้อง...',
      aim: 'เล็งบาร์โค้ดให้อยู่ในกรอบ',
      invalidFormat: 'ไม่รู้จักว่าเป็นบาร์โค้ดกล่องที่ถูกต้อง สแกนต่อไป หรือป้อนด้วยตนเอง',
      cameraErrorPrefix: 'ข้อผิดพลาดกล้อง: ',
      manualBtn: 'ป้อนด้วยตนเอง',
      manualPlaceholder: 'พิมพ์หมายเลขกล่อง (รวม 91 ที่ขึ้นต้น)',
      manualSubmit: 'ตกลง',
      closeBtn: 'ยกเลิก',
      scannedPrefix: 'สแกนแล้ว: '
    }
  };
  var lang = (new URLSearchParams(window.location.search).get('lang') || 'he').toLowerCase();
  if (!TR[lang]) lang = 'he';
  var dict = TR[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'he' || lang === 'ar') ? 'rtl' : 'ltr';
  document.getElementById('headerTitle').textContent = dict.title;
  document.title = dict.title;
  document.getElementById('manualInput').placeholder = dict.manualPlaceholder;
  document.getElementById('manualSubmit').textContent = dict.manualSubmit;
  document.getElementById('manualBtn').textContent = dict.manualBtn;
  document.getElementById('closeBtn').textContent = dict.closeBtn;

  // ====== Scanning ======
  var statusEl     = document.getElementById('status');
  var videoEl      = document.getElementById('video');
  var manualBox    = document.getElementById('manualBox');
  var manualBtn    = document.getElementById('manualBtn');
  var manualInput  = document.getElementById('manualInput');
  var manualError  = document.getElementById('manualError');
  var manualSubmit = document.getElementById('manualSubmit');
  var closeBtn     = document.getElementById('closeBtn');

  var scanControls = null; // returned by decodeFromConstraints - has .stop()
  var mediaStream = null;
  var sent = false;
  var flashTimer = null;

  function post(msg) {
    if (window.opener) window.opener.postMessage(msg, '*');
  }

  function stopCamera() {
    try { if (scanControls) scanControls.stop(); } catch (e) {}
    try {
      if (mediaStream) mediaStream.getTracks().forEach(function (t) { t.stop(); });
    } catch (e) {}
  }

  // Expected shape: "91" + a type code of "05" or "25" + the rest of the
  // carton number. This is a validity check only - nothing is stripped
  // here, the full raw text is sent onward and index.html does the
  // "91" removal (keeping the "05"/"25" segment).
  function validateCartonBarcode(raw) {
    var code = String(raw || '').trim();
    if (code.length < 4 || code.substring(0, 2) !== '91') return { ok: false };
    var seg = code.substring(2, 4);
    if (seg !== '05' && seg !== '25') return { ok: false };
    return { ok: true };
  }

  function flashInvalid() {
    statusEl.textContent = dict.invalidFormat;
    statusEl.className = 'err';
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(function () {
      if (!sent) { statusEl.textContent = dict.aim; statusEl.className = ''; }
    }, 1400);
  }

  function sendResult(code) {
    if (sent) return;
    sent = true;
    stopCamera();
    statusEl.textContent = dict.scannedPrefix + code;
    statusEl.className = 'ok';
    post({ type: 'BARCODE_SCANNED', code: code });
    setTimeout(function () { window.close(); }, 600);
  }

  function startScanning() {
    // Prioritize common 1D carton/box barcode formats plus QR, for speed.
    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.QR_CODE
    ]);

    var codeReader = new ZXing.BrowserMultiFormatReader(hints);

    codeReader.decodeFromConstraints(
      { video: { facingMode: 'environment' } },
      'video',
      function (result) {
        if (!result || sent) return;
        var raw = result.getText().trim();
        if (!validateCartonBarcode(raw).ok) {
          flashInvalid();     // keep scanning - do not send, do not close
          return;
        }
        sendResult(raw);
      }
    ).then(function (controls) {
      scanControls = controls;
      statusEl.textContent = dict.aim;
      statusEl.className = '';
      if (videoEl.srcObject) mediaStream = videoEl.srcObject;
    }).catch(function (err) {
      var msg = err && err.message ? err.message : String(err);
      statusEl.textContent = dict.cameraErrorPrefix + msg;
      statusEl.className = 'err';
      post({ type: 'SCANNER_ERROR', message: msg });
    });
  }

  manualBtn.addEventListener('click', function () {
    manualBox.classList.toggle('show');
    if (manualBox.classList.contains('show')) manualInput.focus();
  });

  manualSubmit.addEventListener('click', function () {
    var val = manualInput.value.trim();
    if (!val) return;
    if (!validateCartonBarcode(val).ok) {
      manualError.textContent = dict.invalidFormat;
      return;
    }
    manualError.textContent = '';
    sendResult(val);
  });

  manualInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') manualSubmit.click();
  });

  closeBtn.addEventListener('click', function () {
    stopCamera();
    window.close();
  });

  window.addEventListener('beforeunload', stopCamera);
  window.addEventListener('pagehide', stopCamera);

  statusEl.textContent = dict.requesting;
  startScanning();
</script>
</body>
</html>
