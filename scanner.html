<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>סריקת ברקוד קרטון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<!--
  Standalone page - host this OUTSIDE Apps Script (e.g. GitHub Pages).
  Apps Script's HtmlService iframe (script.googleusercontent.com) blocks
  getUserMedia, so camera access has to happen in a real top-level popup
  window like this one. It sends the scanned code back to the window that
  opened it via postMessage and then closes itself - but ONLY once a scan
  matches the expected carton pattern ("91" + "05"/"25" + rest); anything
  else is silently ignored (with a live red readout) and scanning
  continues, so a stray barcode in frame doesn't accidentally get accepted.

  Opened as: scanner.html?lang=en|he|ar|th (defaults to he if omitted).
-->
<script src="https://unpkg.com/@zxing/library@0.23.0/umd/index.min.js"></script>
<style>
  :root { --primary:#0f6e5c; --bg:#111; }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0; height:100%;
    background: var(--bg); color:#fff;
    font-family: 'Noto Sans Thai', 'Segoe UI', Arial, sans-serif;
    display:flex; flex-direction:column;
  }
  header { padding: 14px; text-align:center; font-size:16px; font-weight:600; background:#000; }
  .video-wrap { position: relative; flex:1; overflow:hidden; background:#000; }
  video { width:100%; height:100%; object-fit:cover; }
  .frame {
    position:absolute; top:50%; left:50%;
    width:80%; max-width:320px; height:110px;
    transform:translate(-50%,-50%);
    border:3px solid var(--primary);
    border-radius:10px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,.45);
  }

  /* Torch + zoom overlay - only shown when the device reports support */
  .camera-controls {
    position:absolute; bottom:10px; left:0; right:0;
    display:flex; justify-content:center; align-items:center; gap:10px;
    pointer-events:none;
  }
  .cam-btn {
    pointer-events:auto;
    width:44px; height:44px; flex:none; padding:0;
    border-radius:50%; background:rgba(0,0,0,0.55); color:#fff;
    font-size:18px; display:none; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,0.3);
  }
  .cam-btn.active { background: var(--primary); }
  .zoom-controls {
    pointer-events:auto; display:none; align-items:center; gap:2px;
    background:rgba(0,0,0,0.55); border-radius:22px; padding:4px;
    border:1px solid rgba(255,255,255,0.3);
  }
  .zoom-controls .cam-btn { background:transparent; border:none; width:34px; height:34px; display:flex; }
  .zoom-label { font-size:12px; min-width:36px; text-align:center; font-family:'Courier New',monospace; }

  /* Live readout of whatever the camera is currently reading */
  .live-feed {
    padding: 8px 16px 0; text-align:center;
    font-family:'Courier New', monospace; font-size:16px; letter-spacing:.5px;
    min-height:22px; word-break:break-all; color:#8a938c;
  }
  .live-feed.valid { color:#7CFFB2; font-weight:600; }
  .live-feed.invalid { color:#ff8a80; font-weight:600; }

  #status { padding:6px 12px 12px; text-align:center; font-size:14px; min-height:20px; }
  #status.err { color:#ff8a80; }
  #status.ok { color:#7CFFB2; }
  .actions { display:flex; gap:10px; padding:12px 16px 18px; }
  button { flex:1; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
  #closeBtn { background:#333; color:#fff; }
  #manualBtn { background:var(--primary); color:#fff; }
  .manual-box { display:none; padding: 0 16px 16px; }
  .manual-box.show { display:block; }
  .manual-box input { width:100%; padding:12px; font-size:16px; border-radius:8px; border:none; margin-bottom:6px; }
  .manual-box button { width:100%; background:var(--primary); color:#fff; }
  .manual-error { color:#ff8a80; font-size:13px; min-height:16px; margin-bottom:6px; }
</style>
</head>
<body>
  <header id="headerTitle">סרוק ברקוד קרטון</header>

  <div class="video-wrap">
    <video id="video" autoplay muted playsinline></video>
    <div class="frame"></div>
    <div class="camera-controls">
      <button id="torchBtn" class="cam-btn" type="button">🔦</button>
      <div class="zoom-controls" id="zoomControls">
        <button id="zoomOutBtn" class="cam-btn" type="button">−</button>
        <span id="zoomLabel" class="zoom-label">1.0x</span>
        <button id="zoomInBtn" class="cam-btn" type="button">+</button>
      </div>
    </div>
  </div>

  <div id="liveFeed" class="live-feed"></div>
  <div id="status">מבקש הרשאת מצלמה...</div>

  <div class="manual-box" id="manualBox">
    <input type="text" id="manualInput" placeholder="הקלד/י מספר קרטון (כולל 91 בהתחלה)">
    <div class="manual-error" id="manualError"></div>
    <button id="manualSubmit">אישור</button>
  </div>

  <div class="actions">
    <button id="manualBtn">הזנה ידנית</button>
    <button id="closeBtn">בטל</button>
  </div>

<script>
  // ====== i18n (mirrors the language chosen on the main page) ======
  var TR = {
    en: {
      title: 'Scan Carton Barcode',
      requesting: 'Requesting camera permission...',
      aim: 'Aim the barcode at the frame',
      invalidFormat: 'Not recognized as a valid carton barcode. Keep scanning, or enter it manually.',
      cameraErrorPrefix: 'Camera error: ',
      manualBtn: 'Manual entry',
      manualPlaceholder: 'Type carton number (incl. leading 91)',
      manualSubmit: 'OK',
      closeBtn: 'Cancel',
      scannedPrefix: 'Scanned: ',
      torchLabel: 'Flashlight',
      zoomLabel: 'Zoom'
    },
    he: {
      title: 'סרוק ברקוד קרטון',
      requesting: 'מבקש הרשאת מצלמה...',
      aim: 'כוונ/י את הברקוד למסגרת',
      invalidFormat: 'הברקוד לא זוהה כקרטון תקין. המשיכ/י לסרוק, או הזינ/י ידנית.',
      cameraErrorPrefix: 'שגיאת מצלמה: ',
      manualBtn: 'הזנה ידנית',
      manualPlaceholder: 'הקלד/י מספר קרטון (כולל 91 בהתחלה)',
      manualSubmit: 'אישור',
      closeBtn: 'בטל',
      scannedPrefix: 'נסרק: ',
      torchLabel: 'פנס',
      zoomLabel: 'זום'
    },
    ar: {
      title: 'امسح باركود الكرتون',
      requesting: 'جارٍ طلب إذن الكاميرا...',
      aim: 'وجّه الباركود نحو الإطار',
      invalidFormat: 'لم يتم التعرف عليه ككرتون صالح. تابع المسح، أو أدخله يدويًا.',
      cameraErrorPrefix: 'خطأ في الكاميرا: ',
      manualBtn: 'إدخال يدوي',
      manualPlaceholder: 'اكتب رقم الكرتون (متضمنًا 91 في البداية)',
      manualSubmit: 'موافق',
      closeBtn: 'إلغاء',
      scannedPrefix: 'تم المسح: ',
      torchLabel: 'الفلاش',
      zoomLabel: 'التكبير'
    },
    th: {
      title: 'สแกนบาร์โค้ดกล่อง',
      requesting: 'กำลังขอสิทธิ์ใช้กล้อง...',
      aim: 'เล็งบาร์โค้ดให้อยู่ในกรอบ',
      invalidFormat: 'ไม่รู้จักว่าเป็นบาร์โค้ดกล่องที่ถูกต้อง สแกนต่อไป หรือป้อนด้วยตนเอง',
      cameraErrorPrefix: 'ข้อผิดพลาดกล้อง: ',
      manualBtn: 'ป้อนด้วยตนเอง',
      manualPlaceholder: 'พิมพ์หมายเลขกล่อง (รวม 91 ที่ขึ้นต้น)',
      manualSubmit: 'ตกลง',
      closeBtn: 'ยกเลิก',
      scannedPrefix: 'สแกนแล้ว: ',
      torchLabel: 'ไฟฉาย',
      zoomLabel: 'ซูม'
    }
  };
  var lang = (new URLSearchParams(window.location.search).get('lang') || 'he').toLowerCase();
  if (!TR[lang]) lang = 'he';
  var dict = TR[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'he' || lang === 'ar') ? 'rtl' : 'ltr';
  document.getElementById('headerTitle').textContent = dict.title;
  document.title = dict.title;
  document.getElementById('manualInput').placeholder = dict.manualPlaceholder;
  document.getElementById('manualSubmit').textContent = dict.manualSubmit;
  document.getElementById('manualBtn').textContent = dict.manualBtn;
  document.getElementById('closeBtn').textContent = dict.closeBtn;

  // ====== Elements ======
  var statusEl      = document.getElementById('status');
  var liveFeedEl     = document.getElementById('liveFeed');
  var videoEl       = document.getElementById('video');
  var manualBox     = document.getElementById('manualBox');
  var manualBtn     = document.getElementById('manualBtn');
  var manualInput   = document.getElementById('manualInput');
  var manualError   = document.getElementById('manualError');
  var manualSubmit  = document.getElementById('manualSubmit');
  var closeBtn      = document.getElementById('closeBtn');
  var torchBtn      = document.getElementById('torchBtn');
  var zoomControls  = document.getElementById('zoomControls');
  var zoomInBtn     = document.getElementById('zoomInBtn');
  var zoomOutBtn    = document.getElementById('zoomOutBtn');
  var zoomLabelEl   = document.getElementById('zoomLabel');

  torchBtn.title = dict.torchLabel;
  zoomInBtn.title = dict.zoomLabel + ' +';
  zoomOutBtn.title = dict.zoomLabel + ' -';

  var scanControls = null; // returned by decodeFromConstraints - has .stop()
  var mediaStream = null;
  var sent = false;
  var flashTimer = null;

  // ====== Torch / zoom (best-effort - only shown when the device reports support) ======
  var torchTrack = null;
  var torchOn = false;
  var zoomTrack = null;
  var zoomCaps = null;
  var currentZoom = 1;

  function setupCameraCapabilities() {
    if (!mediaStream) return;
    var track = mediaStream.getVideoTracks()[0];
    if (!track || !track.getCapabilities) return;
    var caps = {};
    try { caps = track.getCapabilities(); } catch (e) { caps = {}; }

    // Continuous autofocus, when the device hardware exposes it - silent best-effort.
    if (caps.focusMode && caps.focusMode.indexOf('continuous') !== -1) {
      track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(function () {});
    }

    if (caps.torch) {
      torchTrack = track;
      torchBtn.style.display = 'flex';
    }

    if (caps.zoom && caps.zoom.max > caps.zoom.min) {
      zoomTrack = track;
      zoomCaps = caps.zoom;
      var settings = track.getSettings ? track.getSettings() : {};
      currentZoom = settings.zoom || caps.zoom.min;
      zoomLabelEl.textContent = currentZoom.toFixed(1) + 'x';
      zoomControls.style.display = 'flex';
    }
  }

  torchBtn.addEventListener('click', function () {
    if (!torchTrack) return;
    var next = !torchOn;
    torchTrack.applyConstraints({ advanced: [{ torch: next }] }).then(function () {
      torchOn = next;
      torchBtn.classList.toggle('active', torchOn);
    }).catch(function () {});
  });

  function adjustZoom(direction) {
    if (!zoomTrack || !zoomCaps) return;
    var step = zoomCaps.step || (zoomCaps.max - zoomCaps.min) / 10 || 0.1;
    currentZoom = Math.min(zoomCaps.max, Math.max(zoomCaps.min, currentZoom + direction * step));
    zoomTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] }).then(function () {
      zoomLabelEl.textContent = currentZoom.toFixed(1) + 'x';
    }).catch(function () {});
  }
  zoomInBtn.addEventListener('click', function () { adjustZoom(1); });
  zoomOutBtn.addEventListener('click', function () { adjustZoom(-1); });

  // ====== Sound feedback (synthesized - no external audio files needed) ======
  var audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (e) {}
    }
    return audioCtx;
  }
  function beep(freq, duration, type, volume) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    try {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      var now = ctx.currentTime;
      gain.gain.setValueAtTime(volume || 0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    } catch (e) {}
  }
  function playSuccessSound() {
    beep(1046.5, 0.09, 'sine', 0.22);        // short rising chirp: C6 -> G6
    setTimeout(function () { beep(1568, 0.12, 'sine', 0.22); }, 90);
  }
  function playErrorSound() {
    beep(220, 0.16, 'square', 0.15);         // low double buzz
    setTimeout(function () { beep(180, 0.2, 'square', 0.15); }, 130);
  }

  function post(msg) {
    if (window.opener) window.opener.postMessage(msg, '*');
  }

  function stopCamera() {
    try { if (scanControls) scanControls.stop(); } catch (e) {}
    try {
      if (mediaStream) mediaStream.getTracks().forEach(function (t) { t.stop(); });
    } catch (e) {}
  }

  // Expected shape: "91" + a type code of "05" or "25" + the rest of the
  // carton number. This is a validity check only - nothing is stripped
  // here, the full raw text is sent onward and index.html does the
  // "91" removal (keeping the "05"/"25" segment).
  function validateCartonBarcode(raw) {
    var code = String(raw || '').trim();
    if (code.length < 4 || code.substring(0, 2) !== '91') return { ok: false };
    var seg = code.substring(2, 4);
    if (seg !== '05' && seg !== '25') return { ok: false };
    return { ok: true };
  }

  function flashInvalid() {
    playErrorSound();
    statusEl.textContent = dict.invalidFormat;
    statusEl.className = 'err';
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(function () {
      if (!sent) { statusEl.textContent = dict.aim; statusEl.className = ''; }
    }, 1400);
  }

  function sendResult(code) {
    if (sent) return;
    sent = true;
    playSuccessSound();
    stopCamera();
    statusEl.textContent = dict.scannedPrefix + code;
    statusEl.className = 'ok';
    post({ type: 'BARCODE_SCANNED', code: code });
    setTimeout(function () { window.close(); }, 600);
  }

  function startScanning() {
    // Prioritize common 1D carton/box barcode formats plus QR, for speed.
    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.QR_CODE
    ]);

    var codeReader = new ZXing.BrowserMultiFormatReader(hints);

    codeReader.decodeFromConstraints(
      { video: { facingMode: 'environment' } },
      'video',
      function (result) {
        if (!result || sent) return;
        var raw = result.getText().trim();
        var v = validateCartonBarcode(raw);
        // Live feed: show exactly what the camera is reading right now,
        // in red if it doesn't match a valid carton pattern.
        liveFeedEl.textContent = raw;
        liveFeedEl.className = 'live-feed ' + (v.ok ? 'valid' : 'invalid');
        if (!v.ok) {
          flashInvalid();     // keep scanning - do not send, do not close
          return;
        }
        sendResult(raw);
      }
    ).then(function (controls) {
      scanControls = controls;
      statusEl.textContent = dict.aim;
      statusEl.className = '';
      if (videoEl.srcObject) mediaStream = videoEl.srcObject;
      setupCameraCapabilities();
    }).catch(function (err) {
      var msg = err && err.message ? err.message : String(err);
      statusEl.textContent = dict.cameraErrorPrefix + msg;
      statusEl.className = 'err';
      post({ type: 'SCANNER_ERROR', message: msg });
    });
  }

  manualBtn.addEventListener('click', function () {
    manualBox.classList.toggle('show');
    if (manualBox.classList.contains('show')) manualInput.focus();
  });

  manualSubmit.addEventListener('click', function () {
    var val = manualInput.value.trim();
    if (!val) return;
    if (!validateCartonBarcode(val).ok) {
      manualError.textContent = dict.invalidFormat;
      playErrorSound();
      return;
    }
    manualError.textContent = '';
    sendResult(val);
  });

  manualInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') manualSubmit.click();
  });

  closeBtn.addEventListener('click', function () {
    stopCamera();
    window.close();
  });

  window.addEventListener('beforeunload', stopCamera);
  window.addEventListener('pagehide', stopCamera);

  statusEl.textContent = dict.requesting;
  startScanning();
</script>
</body>
</html>
